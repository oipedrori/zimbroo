<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="/logo.png" as="image" />
  <link rel="preload" href="/notion_logo.png" as="image" />
  <meta id="theme-meta" name="theme-color" content="#FBFEFB" />
  <title>Zimbroo</title>
  <style>
    /* Prevent theme flash */
    html.theme-dark { background-color: #050a06 !important; color: #ffffff; }
    html.theme-light { background-color: #FBFEFB !important; color: #0E2210; }
    body { background-color: inherit; }
  </style>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('zimbroo_theme') || 'system';
        var root = document.documentElement;
        var meta = document.getElementById('theme-meta');
        
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        
        // Remove transitions during initial theme application
        root.style.transition = 'none';
        
        if (isDark) {
          root.classList.add('theme-dark');
          root.classList.remove('theme-light');
          if (meta) meta.setAttribute('content', '#050a06');
        } else {
          root.classList.add('theme-light');
          root.classList.remove('theme-dark');
          if (meta) meta.setAttribute('content', '#FBFEFB');
        }
        
        // Force background early
        root.style.backgroundColor = isDark ? '#050a06' : '#FBFEFB';
        
        // Restore transitions after a frame
        requestAnimationFrame(function() {
           root.style.transition = '';
        });
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root">
    <!-- Splash Screen (Visible until React mounts) -->
    <div id="zimbroo-splash" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #FBFEFB; /* Default light green tint */
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    ">
      <style>
        @keyframes pulse-logo {
          0% { transform: scale(1); opacity: 0.8; }
          50% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(1); opacity: 0.8; }
        }
        .splash-logo {
          width: 80px;
          height: 80px;
          animation: pulse-logo 2s infinite ease-in-out;
        }
        /* Theme awareness for splash */
        html.theme-dark #zimbroo-splash { background-color: #050a06 !important; }
      </style>
      <img src="/logo.png" alt="Zimbroo" class="splash-logo" onerror="this.style.display='none'" />
      <div style="margin-top: 24px; display: flex; gap: 6px;">
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #1B4520; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.32s;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #1B4520; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.16s;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #1B4520; animation: bounce 1.4s infinite ease-in-out both;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
